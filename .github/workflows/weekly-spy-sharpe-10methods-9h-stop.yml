name: Weekly SPY Sharpe 10 Methods 9h Stop

on:
  workflow_dispatch:
    inputs:
      source_run_id:
        description: "Run id to cancel"
        required: true

permissions:
  contents: read
  actions: write

jobs:
  stop:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Cancel source run
        env:
          GH_TOKEN: ${{ github.token }}
          SOURCE_RUN_ID: ${{ inputs.source_run_id }}
          REPO: ${{ github.repository }}
        run: gh api -X POST "repos/${REPO}/actions/runs/${SOURCE_RUN_ID}/cancel"
