name: Fair ML Aurora vs GitHub 30m

on:
  workflow_dispatch:
    inputs:
      seconds_per_engine:
        description: Effective seconds per engine inside each paired job
        required: false
        default: "480"
  push:
    branches:
      - main
    paths:
      - ".github/fair-ml-aurora-vs-github-30m-trigger.txt"
      - ".github/workflows/fair-ml-aurora-vs-github-30m.yml"
      - "scripts/fair_ml_aurora_vs_github.py"
      - "src/aurora/**"
      - "pyproject.toml"

permissions:
  contents: read

jobs:
  benchmark:
    name: ${{ matrix.track }} / ${{ matrix.order }}
    runs-on: ubuntu-latest
    timeout-minutes: 25
    strategy:
      fail-fast: false
      max-parallel: 2
      matrix:
        include:
          - track: normalized
            order: aurora_first
          - track: normalized
            order: github_first
    steps:
      - name: Checkout trading-lab
        uses: actions/checkout@v4
        with:
          path: trading-lab

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install benchmark dependencies
        id: install
        continue-on-error: true
        run: |
          set +e
          mkdir -p "$GITHUB_WORKSPACE/install-logs"
          python -m pip install --upgrade pip > "$GITHUB_WORKSPACE/install-logs/pip-upgrade.log" 2>&1
          python -m pip install numpy pandas pyyaml pydantic scikit-learn scipy pyarrow > "$GITHUB_WORKSPACE/install-logs/pip-install.log" 2>&1
          echo "install_exit=$?" >> "$GITHUB_OUTPUT"

      - name: Upload install logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: fair-ml-install-log-${{ matrix.track }}-${{ matrix.order }}
          path: install-logs
          if-no-files-found: ignore

      - name: Stop if install failed
        if: steps.install.outputs.install_exit != '0'
        run: exit 1

      - name: Run paired benchmark
        env:
          PYTHONPATH: ${{ github.workspace }}/trading-lab/src:${{ github.workspace }}/trading-lab
        run: |
          python trading-lab/scripts/fair_ml_aurora_vs_github.py run-pair \
            --track "${{ matrix.track }}" \
            --order "${{ matrix.order }}" \
            --seconds-per-engine "${{ inputs.seconds_per_engine || '480' }}" \
            --trading-lab-dir "$GITHUB_WORKSPACE/trading-lab" \
            --output-dir "$GITHUB_WORKSPACE/results/${{ matrix.track }}-${{ matrix.order }}"

      - name: Upload pair artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: fair-ml-pair-${{ matrix.track }}-${{ matrix.order }}
          path: results/${{ matrix.track }}-${{ matrix.order }}
          if-no-files-found: warn

  merge:
    name: Merge fair ML benchmark
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: benchmark
    if: always()
    steps:
      - name: Checkout trading-lab
        uses: actions/checkout@v4
        with:
          path: trading-lab

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install merge dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install numpy pandas pyyaml pydantic

      - name: Download pair artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: fair-ml-pair-*
          path: pair-results
          merge-multiple: false

      - name: Merge benchmark results
        env:
          PYTHONPATH: ${{ github.workspace }}/trading-lab/src:${{ github.workspace }}/trading-lab
        run: |
          python trading-lab/scripts/fair_ml_aurora_vs_github.py merge \
            --input-root "$GITHUB_WORKSPACE/pair-results" \
            --output-dir "$GITHUB_WORKSPACE/fair-ml-aurora-vs-github-30m-results"

      - name: Upload final artifact
        uses: actions/upload-artifact@v4
        with:
          name: fair-ml-aurora-vs-github-30m-results
          path: fair-ml-aurora-vs-github-30m-results
          if-no-files-found: error
