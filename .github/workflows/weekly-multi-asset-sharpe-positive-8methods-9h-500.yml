name: Weekly Multi Asset Sharpe Positive Years 8 Methods 9h 500

on:
  workflow_dispatch:
    inputs:
      waves:
        description: "Fixed at 2; fails clearly if changed"
        required: true
        default: "2"
      minutes_per_method_stage:
        description: "Minutes for each method-stage job"
        required: true
        default: "240"
      max_parallel:
        description: "Max parallel jobs requested inside each block"
        required: true
        default: "500"
  push:
    branches:
      - main
    paths:
      - .github/weekly-multi-asset-sharpe-positive-8methods-9h-500-trigger.txt

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  CONFIG: configs/weekly_multi_asset_sharpe_positive_8methods_9h_500.yaml
  OUTPUT_DIR: outputs/weekly_multi_asset_sharpe_positive_8methods_9h_500
  FILE_PREFIX: weekly_multi_asset_sharpe_positive_8methods_9h_500

permissions:
  contents: read
  actions: read

jobs:
  data:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - name: Validate fixed 9h/500 shape
        run: |
          test "${{ inputs.waves || '2' }}" = "2"
          test "${{ inputs.max_parallel || '500' }}" -ge 1
          test "${{ inputs.max_parallel || '500' }}" -le 500
          test "${{ inputs.minutes_per_method_stage || '240' }}" -ge 1
          test "${{ inputs.minutes_per_method_stage || '240' }}" -le 240
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install
        run: python -m pip install -e ".[dev]"
      - name: Download public multi-asset panel
        run: python scripts/download_public_data.py --feature-panel --output data/public/spy_daily.csv
      - name: Audit multi-asset panel
        run: |
          python scripts/audit_weekly_multi_asset_panel.py \
            --data data/public/spy_daily.csv \
            --output "$OUTPUT_DIR/weekly_multi_asset_sharpe_positive_8methods_9h_500_asset_audit.json" \
            --start-year 1994 \
            --end-year 2026 \
            --min-assets 10
      - name: Upload public panel
        uses: actions/upload-artifact@v4
        with:
          name: weekly-multi-asset-sharpe-positive-8methods-9h-500-public-panel
          path: data/public/spy_daily.csv
      - name: Upload asset audit
        uses: actions/upload-artifact@v4
        with:
          name: weekly-multi-asset-sharpe-positive-8methods-9h-500-asset-audit
          path: ${{ env.OUTPUT_DIR }}/weekly_multi_asset_sharpe_positive_8methods_9h_500_asset_audit.json

  wave-1-a:
    needs: data
    uses: ./.github/workflows/weekly-multi-asset-sharpe-positive-8methods-9h-500-block-a.yml
    with:
      wave: 1
      minutes_per_method_stage: ${{ fromJSON(inputs.minutes_per_method_stage || '240') }}
      max_parallel: ${{ fromJSON(inputs.max_parallel || '500') }}
      prior_state_artifact: ""

  wave-1-b:
    needs: data
    uses: ./.github/workflows/weekly-multi-asset-sharpe-positive-8methods-9h-500-block-b.yml
    with:
      wave: 1
      minutes_per_method_stage: ${{ fromJSON(inputs.minutes_per_method_stage || '240') }}
      max_parallel: ${{ fromJSON(inputs.max_parallel || '500') }}
      prior_state_artifact: ""

  state-wave-1:
    runs-on: ubuntu-latest
    needs: [wave-1-a, wave-1-b]
    if: ${{ always() }}
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install
        run: python -m pip install -e ".[dev]"
      - name: Download wave 1 stage artifacts
        uses: actions/download-artifact@v4
        with:
          path: outputs/weekly_multi_asset_sharpe_positive_8methods_9h_500/wave_1_artifacts
          pattern: weekly-multi-asset-sharpe-positive-8methods-9h-500-wave-1-*
          merge-multiple: true
      - name: Merge wave 1 state
        run: |
          python scripts/merge_weekly_spy_sharpe_10methods_9h_state.py \
            --config "$CONFIG" \
            --input-glob "outputs/weekly_multi_asset_sharpe_positive_8methods_9h_500/wave_1_artifacts/**/state/${FILE_PREFIX}_state_*.json" \
            --output-dir "$OUTPUT_DIR/state_wave_1" \
            --file-prefix "$FILE_PREFIX" \
            --state-top 500 \
            --expected-files-per-method 62 \
            --allow-missing-files-per-method 62
      - name: Upload wave 1 state
        uses: actions/upload-artifact@v4
        with:
          name: weekly-multi-asset-sharpe-positive-8methods-9h-500-state-wave-1
          path: ${{ env.OUTPUT_DIR }}/state_wave_1

  wave-2-a:
    needs: state-wave-1
    uses: ./.github/workflows/weekly-multi-asset-sharpe-positive-8methods-9h-500-block-a.yml
    with:
      wave: 2
      minutes_per_method_stage: ${{ fromJSON(inputs.minutes_per_method_stage || '240') }}
      max_parallel: ${{ fromJSON(inputs.max_parallel || '500') }}
      prior_state_artifact: weekly-multi-asset-sharpe-positive-8methods-9h-500-state-wave-1

  wave-2-b:
    needs: state-wave-1
    uses: ./.github/workflows/weekly-multi-asset-sharpe-positive-8methods-9h-500-block-b.yml
    with:
      wave: 2
      minutes_per_method_stage: ${{ fromJSON(inputs.minutes_per_method_stage || '240') }}
      max_parallel: ${{ fromJSON(inputs.max_parallel || '500') }}
      prior_state_artifact: weekly-multi-asset-sharpe-positive-8methods-9h-500-state-wave-1

  state-wave-2:
    runs-on: ubuntu-latest
    needs: [wave-2-a, wave-2-b]
    if: ${{ always() }}
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install
        run: python -m pip install -e ".[dev]"
      - name: Download wave 2 stage artifacts
        uses: actions/download-artifact@v4
        with:
          path: outputs/weekly_multi_asset_sharpe_positive_8methods_9h_500/wave_2_artifacts
          pattern: weekly-multi-asset-sharpe-positive-8methods-9h-500-wave-2-*
          merge-multiple: true
      - name: Merge wave 2 state
        run: |
          python scripts/merge_weekly_spy_sharpe_10methods_9h_state.py \
            --config "$CONFIG" \
            --input-glob "outputs/weekly_multi_asset_sharpe_positive_8methods_9h_500/wave_2_artifacts/**/state/${FILE_PREFIX}_state_*.json" \
            --output-dir "$OUTPUT_DIR/state_wave_2" \
            --file-prefix "$FILE_PREFIX" \
            --state-top 500 \
            --expected-files-per-method 62 \
            --allow-missing-files-per-method 62
      - name: Upload wave 2 state
        uses: actions/upload-artifact@v4
        with:
          name: weekly-multi-asset-sharpe-positive-8methods-9h-500-state-wave-2
          path: ${{ env.OUTPUT_DIR }}/state_wave_2

  merge:
    runs-on: ubuntu-latest
    needs: state-wave-2
    if: ${{ always() }}
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install
        run: python -m pip install -e ".[dev]"
      - name: Download all method-stage artifacts
        uses: actions/download-artifact@v4
        with:
          path: outputs/weekly_multi_asset_sharpe_positive_8methods_9h_500/artifacts
          pattern: weekly-multi-asset-sharpe-positive-8methods-9h-500-wave-*
          merge-multiple: true
      - name: Download asset audit
        uses: actions/download-artifact@v4
        with:
          name: weekly-multi-asset-sharpe-positive-8methods-9h-500-asset-audit
          path: ${{ env.OUTPUT_DIR }}
      - name: Merge all available artifacts
        run: |
          python scripts/merge_weekly_spy_sharpe_10methods_9h.py \
            --config "$CONFIG" \
            --input-glob "outputs/weekly_multi_asset_sharpe_positive_8methods_9h_500/artifacts/**/${FILE_PREFIX}_leaderboard_stage_*.csv" \
            --output-dir "$OUTPUT_DIR" \
            --file-prefix "$FILE_PREFIX" \
            --expected-jobs 992
      - name: Upload final leaderboard
        uses: actions/upload-artifact@v4
        with:
          name: weekly-multi-asset-sharpe-positive-8methods-9h-500-leaderboard
          path: |
            outputs/weekly_multi_asset_sharpe_positive_8methods_9h_500/weekly_multi_asset_sharpe_positive_8methods_9h_500_leaderboard.csv
            outputs/weekly_multi_asset_sharpe_positive_8methods_9h_500/weekly_multi_asset_sharpe_positive_8methods_9h_500_verified.csv
            outputs/weekly_multi_asset_sharpe_positive_8methods_9h_500/weekly_multi_asset_sharpe_positive_8methods_9h_500_relaxed_valid.csv
            outputs/weekly_multi_asset_sharpe_positive_8methods_9h_500/weekly_multi_asset_sharpe_positive_8methods_9h_500_methods.csv
            outputs/weekly_multi_asset_sharpe_positive_8methods_9h_500/weekly_multi_asset_sharpe_positive_8methods_9h_500_efficiency.csv
            outputs/weekly_multi_asset_sharpe_positive_8methods_9h_500/weekly_multi_asset_sharpe_positive_8methods_9h_500_parallelism.json
            outputs/weekly_multi_asset_sharpe_positive_8methods_9h_500/weekly_multi_asset_sharpe_positive_8methods_9h_500_state_summary.json
            outputs/weekly_multi_asset_sharpe_positive_8methods_9h_500/weekly_multi_asset_sharpe_positive_8methods_9h_500_summary.json
            outputs/weekly_multi_asset_sharpe_positive_8methods_9h_500/weekly_multi_asset_sharpe_positive_8methods_9h_500_asset_audit.json
