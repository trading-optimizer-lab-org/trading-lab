name: Codespaces Smoke

on:
  push:
    paths:
      - ".devcontainer/**"
      - ".github/workflows/codespaces-smoke.yml"
      - "pyproject.toml"
      - "src/**"
      - "tests/**"
  workflow_dispatch:

jobs:
  devcontainer:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - name: Build Codespaces devcontainer and run tests
        uses: devcontainers/ci@v0.3
        with:
          runCmd: python -m pytest -q -p no:cacheprovider
