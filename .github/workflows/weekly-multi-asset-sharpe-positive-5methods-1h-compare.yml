name: Weekly Multi Asset Sharpe Positive 5 Methods 1h Compare

on:
  workflow_dispatch:
    inputs:
      waves:
        description: "Fixed at 2; fails clearly if changed"
        required: true
        default: "2"
      minutes_per_method_stage:
        description: "Minutes for each method-stage job; default keeps the workflow near one hour"
        required: true
        default: "15"
      max_parallel:
        description: "Max parallel jobs requested inside each wave"
        required: true
        default: "100"
  push:
    branches:
      - main
    paths:
      - .github/weekly-multi-asset-sharpe-positive-5methods-1h-compare-trigger.txt

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  CONFIG: configs/weekly_multi_asset_sharpe_positive_5methods_1h_compare.yaml
  OUTPUT_DIR: outputs/weekly_multi_asset_sharpe_positive_5methods_1h_compare
  FILE_PREFIX: weekly_multi_asset_sharpe_positive_5methods_1h_compare

permissions:
  contents: read
  actions: read

jobs:
  data:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - name: Validate fixed fair 1h shape
        run: |
          test "${{ inputs.waves || '2' }}" = "2"
          test "${{ inputs.max_parallel || '100' }}" -ge 1
          test "${{ inputs.max_parallel || '100' }}" -le 100
          test "${{ inputs.minutes_per_method_stage || '15' }}" -ge 1
          test "${{ inputs.minutes_per_method_stage || '15' }}" -le 15
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install
        run: python -m pip install -e ".[dev]"
      - name: Download public multi-asset panel
        run: python scripts/download_public_data.py --feature-panel --output data/public/spy_daily.csv
      - name: Audit multi-asset panel
        run: |
          python scripts/audit_weekly_multi_asset_panel.py \
            --data data/public/spy_daily.csv \
            --output "$OUTPUT_DIR/weekly_multi_asset_sharpe_positive_5methods_1h_compare_asset_audit.json" \
            --start-year 1994 \
            --end-year 2026 \
            --min-assets 10
      - name: Upload public panel
        uses: actions/upload-artifact@v4
        with:
          name: weekly-multi-asset-sharpe-positive-5methods-1h-compare-public-panel
          path: data/public/spy_daily.csv
      - name: Upload asset audit
        uses: actions/upload-artifact@v4
        with:
          name: weekly-multi-asset-sharpe-positive-5methods-1h-compare-asset-audit
          path: ${{ env.OUTPUT_DIR }}/weekly_multi_asset_sharpe_positive_5methods_1h_compare_asset_audit.json

  wave-1:
    needs: data
    uses: ./.github/workflows/weekly-multi-asset-sharpe-positive-5methods-1h-compare-wave.yml
    with:
      wave: 1
      minutes_per_method_stage: ${{ fromJSON(inputs.minutes_per_method_stage || '15') }}
      max_parallel: ${{ fromJSON(inputs.max_parallel || '100') }}
      prior_state_artifact: ""

  state-wave-1:
    runs-on: ubuntu-latest
    needs: wave-1
    if: ${{ always() }}
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install
        run: python -m pip install -e ".[dev]"
      - name: Download wave 1 stage artifacts
        uses: actions/download-artifact@v4
        with:
          path: outputs/weekly_multi_asset_sharpe_positive_5methods_1h_compare/wave_1_artifacts
          pattern: weekly-multi-asset-sharpe-positive-5methods-1h-compare-wave-1-*
          merge-multiple: true
      - name: Merge wave 1 state
        run: |
          python scripts/merge_weekly_spy_sharpe_10methods_9h_state.py \
            --config "$CONFIG" \
            --input-glob "outputs/weekly_multi_asset_sharpe_positive_5methods_1h_compare/wave_1_artifacts/**/state/${FILE_PREFIX}_state_*.json" \
            --output-dir "$OUTPUT_DIR/state_wave_1" \
            --file-prefix "$FILE_PREFIX" \
            --state-top 500 \
            --expected-files-per-method 20 \
            --allow-missing-files-per-method 20
      - name: Upload wave 1 state
        uses: actions/upload-artifact@v4
        with:
          name: weekly-multi-asset-sharpe-positive-5methods-1h-compare-state-wave-1
          path: ${{ env.OUTPUT_DIR }}/state_wave_1

  wave-2:
    needs: state-wave-1
    uses: ./.github/workflows/weekly-multi-asset-sharpe-positive-5methods-1h-compare-wave.yml
    with:
      wave: 2
      minutes_per_method_stage: ${{ fromJSON(inputs.minutes_per_method_stage || '15') }}
      max_parallel: ${{ fromJSON(inputs.max_parallel || '100') }}
      prior_state_artifact: weekly-multi-asset-sharpe-positive-5methods-1h-compare-state-wave-1

  state-wave-2:
    runs-on: ubuntu-latest
    needs: wave-2
    if: ${{ always() }}
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install
        run: python -m pip install -e ".[dev]"
      - name: Download wave 2 stage artifacts
        uses: actions/download-artifact@v4
        with:
          path: outputs/weekly_multi_asset_sharpe_positive_5methods_1h_compare/wave_2_artifacts
          pattern: weekly-multi-asset-sharpe-positive-5methods-1h-compare-wave-2-*
          merge-multiple: true
      - name: Merge wave 2 state
        run: |
          python scripts/merge_weekly_spy_sharpe_10methods_9h_state.py \
            --config "$CONFIG" \
            --input-glob "outputs/weekly_multi_asset_sharpe_positive_5methods_1h_compare/wave_2_artifacts/**/state/${FILE_PREFIX}_state_*.json" \
            --output-dir "$OUTPUT_DIR/state_wave_2" \
            --file-prefix "$FILE_PREFIX" \
            --state-top 500 \
            --expected-files-per-method 20 \
            --allow-missing-files-per-method 20
      - name: Upload wave 2 state
        uses: actions/upload-artifact@v4
        with:
          name: weekly-multi-asset-sharpe-positive-5methods-1h-compare-state-wave-2
          path: ${{ env.OUTPUT_DIR }}/state_wave_2

  merge:
    runs-on: ubuntu-latest
    needs: state-wave-2
    if: ${{ always() }}
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install
        run: python -m pip install -e ".[dev]"
      - name: Download all method-stage artifacts
        uses: actions/download-artifact@v4
        with:
          path: outputs/weekly_multi_asset_sharpe_positive_5methods_1h_compare/artifacts
          pattern: weekly-multi-asset-sharpe-positive-5methods-1h-compare-wave-*
          merge-multiple: true
      - name: Download asset audit
        uses: actions/download-artifact@v4
        with:
          name: weekly-multi-asset-sharpe-positive-5methods-1h-compare-asset-audit
          path: ${{ env.OUTPUT_DIR }}
      - name: Merge all available artifacts
        run: |
          python scripts/merge_weekly_spy_sharpe_10methods_9h.py \
            --config "$CONFIG" \
            --input-glob "outputs/weekly_multi_asset_sharpe_positive_5methods_1h_compare/artifacts/**/${FILE_PREFIX}_leaderboard_stage_*.csv" \
            --output-dir "$OUTPUT_DIR" \
            --file-prefix "$FILE_PREFIX" \
            --expected-jobs 200
      - name: Upload final leaderboard
        uses: actions/upload-artifact@v4
        with:
          name: weekly-multi-asset-sharpe-positive-5methods-1h-compare-leaderboard
          path: |
            outputs/weekly_multi_asset_sharpe_positive_5methods_1h_compare/weekly_multi_asset_sharpe_positive_5methods_1h_compare_leaderboard.csv
            outputs/weekly_multi_asset_sharpe_positive_5methods_1h_compare/weekly_multi_asset_sharpe_positive_5methods_1h_compare_verified.csv
            outputs/weekly_multi_asset_sharpe_positive_5methods_1h_compare/weekly_multi_asset_sharpe_positive_5methods_1h_compare_relaxed_valid.csv
            outputs/weekly_multi_asset_sharpe_positive_5methods_1h_compare/weekly_multi_asset_sharpe_positive_5methods_1h_compare_methods.csv
            outputs/weekly_multi_asset_sharpe_positive_5methods_1h_compare/weekly_multi_asset_sharpe_positive_5methods_1h_compare_efficiency.csv
            outputs/weekly_multi_asset_sharpe_positive_5methods_1h_compare/weekly_multi_asset_sharpe_positive_5methods_1h_compare_parallelism.json
            outputs/weekly_multi_asset_sharpe_positive_5methods_1h_compare/weekly_multi_asset_sharpe_positive_5methods_1h_compare_state_summary.json
            outputs/weekly_multi_asset_sharpe_positive_5methods_1h_compare/weekly_multi_asset_sharpe_positive_5methods_1h_compare_summary.json
            outputs/weekly_multi_asset_sharpe_positive_5methods_1h_compare/weekly_multi_asset_sharpe_positive_5methods_1h_compare_asset_audit.json
