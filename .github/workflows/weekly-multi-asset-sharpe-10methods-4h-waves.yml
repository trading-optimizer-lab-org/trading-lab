name: Weekly Multi Asset Sharpe 10 Methods 4h Waves

on:
  workflow_dispatch:
    inputs:
      waves:
        description: "Fixed at 2; fails clearly if changed"
        required: true
        default: "2"
      minutes_per_method_stage:
        description: "Minutes for each method-stage job"
        required: true
        default: "70"
      max_parallel:
        description: "Max parallel jobs inside each wave"
        required: true
        default: "180"
  push:
    branches:
      - main
    paths:
      - .github/weekly-multi-asset-sharpe-10methods-4h-trigger.txt

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  CONFIG: configs/weekly_multi_asset_sharpe_10methods_4h_waves.yaml
  OUTPUT_DIR: outputs/weekly_multi_asset_sharpe_10methods_4h
  FILE_PREFIX: weekly_multi_asset_sharpe_10methods_4h

permissions:
  contents: read
  actions: read

jobs:
  data:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - name: Validate fixed 4h shape
        run: |
          test "${{ inputs.waves || '2' }}" = "2"
          test "${{ inputs.max_parallel || '180' }}" -ge 1
          test "${{ inputs.max_parallel || '180' }}" -le 180
          test "${{ inputs.minutes_per_method_stage || '70' }}" -ge 1
          test "${{ inputs.minutes_per_method_stage || '70' }}" -le 70
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install
        run: python -m pip install -e ".[dev]"
      - name: Download public multi-asset panel
        run: python scripts/download_public_data.py --feature-panel --output data/public/spy_daily.csv
      - name: Audit multi-asset panel
        run: |
          python scripts/audit_weekly_multi_asset_panel.py \
            --data data/public/spy_daily.csv \
            --output "$OUTPUT_DIR/weekly_multi_asset_sharpe_10methods_4h_asset_audit.json" \
            --start-year 1994 \
            --end-year 2026 \
            --min-assets 10
      - name: Upload public panel
        uses: actions/upload-artifact@v4
        with:
          name: weekly-multi-asset-sharpe-10methods-4h-public-panel
          path: data/public/spy_daily.csv
      - name: Upload asset audit
        uses: actions/upload-artifact@v4
        with:
          name: weekly-multi-asset-sharpe-10methods-4h-asset-audit
          path: ${{ env.OUTPUT_DIR }}/weekly_multi_asset_sharpe_10methods_4h_asset_audit.json

  wave-1:
    needs: data
    uses: ./.github/workflows/weekly-multi-asset-sharpe-10methods-4h-wave.yml
    with:
      wave: 1
      minutes_per_method_stage: ${{ fromJSON(inputs.minutes_per_method_stage || '70') }}
      max_parallel: ${{ fromJSON(inputs.max_parallel || '180') }}
      prior_state_artifact: ""

  wave-2:
    needs: wave-1
    uses: ./.github/workflows/weekly-multi-asset-sharpe-10methods-4h-wave.yml
    with:
      wave: 2
      minutes_per_method_stage: ${{ fromJSON(inputs.minutes_per_method_stage || '70') }}
      max_parallel: ${{ fromJSON(inputs.max_parallel || '180') }}
      prior_state_artifact: weekly-multi-asset-sharpe-10methods-4h-state-wave-1

  merge:
    runs-on: ubuntu-latest
    needs: wave-2
    if: ${{ always() }}
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install
        run: python -m pip install -e ".[dev]"
      - name: Download method-stage artifacts
        uses: actions/download-artifact@v4
        with:
          path: outputs/weekly_multi_asset_sharpe_10methods_4h/artifacts
          pattern: weekly-multi-asset-sharpe-10methods-4h-wave-*
          merge-multiple: true
      - name: Download asset audit
        uses: actions/download-artifact@v4
        with:
          name: weekly-multi-asset-sharpe-10methods-4h-asset-audit
          path: ${{ env.OUTPUT_DIR }}
      - name: Merge all available artifacts
        run: |
          python scripts/merge_weekly_spy_sharpe_10methods_9h.py \
            --config "$CONFIG" \
            --input-glob "outputs/weekly_multi_asset_sharpe_10methods_4h/artifacts/**/${FILE_PREFIX}_leaderboard_stage_*.csv" \
            --output-dir "$OUTPUT_DIR" \
            --file-prefix "$FILE_PREFIX" \
            --expected-jobs 360
      - name: Upload final leaderboard
        uses: actions/upload-artifact@v4
        with:
          name: weekly-multi-asset-sharpe-10methods-4h-waves-leaderboard
          path: |
            outputs/weekly_multi_asset_sharpe_10methods_4h/weekly_multi_asset_sharpe_10methods_4h_leaderboard.csv
            outputs/weekly_multi_asset_sharpe_10methods_4h/weekly_multi_asset_sharpe_10methods_4h_verified.csv
            outputs/weekly_multi_asset_sharpe_10methods_4h/weekly_multi_asset_sharpe_10methods_4h_relaxed_valid.csv
            outputs/weekly_multi_asset_sharpe_10methods_4h/weekly_multi_asset_sharpe_10methods_4h_methods.csv
            outputs/weekly_multi_asset_sharpe_10methods_4h/weekly_multi_asset_sharpe_10methods_4h_efficiency.csv
            outputs/weekly_multi_asset_sharpe_10methods_4h/weekly_multi_asset_sharpe_10methods_4h_parallelism.json
            outputs/weekly_multi_asset_sharpe_10methods_4h/weekly_multi_asset_sharpe_10methods_4h_state_summary.json
            outputs/weekly_multi_asset_sharpe_10methods_4h/weekly_multi_asset_sharpe_10methods_4h_summary.json
            outputs/weekly_multi_asset_sharpe_10methods_4h/weekly_multi_asset_sharpe_10methods_4h_asset_audit.json
