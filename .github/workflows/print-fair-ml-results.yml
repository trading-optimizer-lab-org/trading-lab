name: Print Fair ML Results

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - ".github/print-fair-ml-results-trigger.txt"
      - ".github/workflows/print-fair-ml-results.yml"

permissions:
  contents: read
  actions: read

jobs:
  print:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install merge dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pandas pyyaml pydantic

      - name: Download pair artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: fair-ml-pair-*
          run-id: 26524768799
          path: fair-ml-pairs
          merge-multiple: false
          github-token: ${{ github.token }}

      - name: Re-merge with current relaxed rule
        run: |
          python scripts/fair_ml_aurora_vs_github.py merge --input-root fair-ml-pairs --output-dir fair-ml-results

      - name: Print summary
        run: |
          echo "=== fair_ml_summary.json ==="
          cat fair-ml-results/fair_ml_summary.json
          echo ""
          echo "=== fair_ml_summary_table.csv ==="
          cat fair-ml-results/fair_ml_summary_table.csv
          echo ""
          echo "=== fair_ml_results.csv ==="
          cat fair-ml-results/fair_ml_results.csv

      - name: Upload relaxed results
        uses: actions/upload-artifact@v4
        with:
          name: fair-ml-aurora-vs-github-30m-results-relaxed
          path: fair-ml-results/
