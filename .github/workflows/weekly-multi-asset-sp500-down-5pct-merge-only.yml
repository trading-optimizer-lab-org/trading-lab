name: Weekly Multi Asset SP500 Down 5pct Merge Only

on:
  workflow_dispatch:
    inputs:
      source_run_id:
        description: "Run id with completed weekly stage artifacts"
        required: true
        default: "26403399638"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read
  actions: read

jobs:
  merge-method:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      fail-fast: false
      max-parallel: 5
      matrix:
        include:
          - method: random_broad
            artifact_pattern: weekly-down-5pct-random-broad-stage-*
          - method: beam
            artifact_pattern: weekly-down-5pct-beam-stage-*
          - method: genetic
            artifact_pattern: weekly-down-5pct-genetic-stage-*
          - method: bayesian_like
            artifact_pattern: weekly-down-5pct-bayesian-like-stage-*
          - method: bandit
            artifact_pattern: weekly-down-5pct-bandit-stage-*
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install
        run: python -m pip install -e ".[dev]"
      - name: Download source method stages
        uses: actions/download-artifact@v4
        with:
          repository: ${{ github.repository }}
          run-id: ${{ inputs.source_run_id }}
          github-token: ${{ github.token }}
          path: outputs/weekly_multi_asset_sp500_down_5pct/stages/${{ matrix.method }}
          pattern: ${{ matrix.artifact_pattern }}
      - name: Merge source method stages
        run: python scripts/merge_weekly_multi_asset_down_5pct.py --config configs/weekly_multi_asset_sp500_down_5pct.yaml --input-glob "outputs/weekly_multi_asset_sp500_down_5pct/stages/${{ matrix.method }}/**/weekly_multi_asset_sp500_down_5pct_leaderboard_stage_*.csv" --output-dir outputs/weekly_multi_asset_sp500_down_5pct/method_merges/${{ matrix.method }} --skip-examples --progress-every 10 --max-output-rows 20000
      - name: Upload source method merge
        uses: actions/upload-artifact@v4
        with:
          name: weekly-down-5pct-method-merge-${{ matrix.method }}
          path: |
            outputs/weekly_multi_asset_sp500_down_5pct/method_merges/${{ matrix.method }}/weekly_multi_asset_sp500_down_5pct_leaderboard.csv
            outputs/weekly_multi_asset_sp500_down_5pct/method_merges/${{ matrix.method }}/weekly_multi_asset_sp500_down_5pct_verified.csv
            outputs/weekly_multi_asset_sp500_down_5pct/method_merges/${{ matrix.method }}/weekly_multi_asset_sp500_down_5pct_methods.csv
            outputs/weekly_multi_asset_sp500_down_5pct/method_merges/${{ matrix.method }}/weekly_multi_asset_sp500_down_5pct_summary.json

  merge:
    runs-on: ubuntu-latest
    needs: merge-method
    if: always()
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install
        run: python -m pip install -e ".[dev]"
      - name: Download method merges
        uses: actions/download-artifact@v4
        with:
          path: outputs/weekly_multi_asset_sp500_down_5pct/method_merges
          pattern: weekly-down-5pct-method-merge-*
      - name: Download source public panel
        uses: actions/download-artifact@v4
        with:
          repository: ${{ github.repository }}
          run-id: ${{ inputs.source_run_id }}
          github-token: ${{ github.token }}
          name: weekly-multi-asset-public-panel
          path: data/public
      - name: Merge source weekly multi-asset methods
        run: python scripts/merge_weekly_multi_asset_down_5pct.py --config configs/weekly_multi_asset_sp500_down_5pct.yaml --input-glob "outputs/weekly_multi_asset_sp500_down_5pct/method_merges/**/weekly_multi_asset_sp500_down_5pct_leaderboard.csv" --output-dir outputs/weekly_multi_asset_sp500_down_5pct --progress-every 1 --max-output-rows 50000
      - name: Upload weekly multi-asset leaderboard
        uses: actions/upload-artifact@v4
        with:
          name: weekly-multi-asset-sp500-down-5pct-500-leaderboard
          path: |
            outputs/weekly_multi_asset_sp500_down_5pct/weekly_multi_asset_sp500_down_5pct_leaderboard.csv
            outputs/weekly_multi_asset_sp500_down_5pct/weekly_multi_asset_sp500_down_5pct_verified.csv
            outputs/weekly_multi_asset_sp500_down_5pct/weekly_multi_asset_sp500_down_5pct_methods.csv
            outputs/weekly_multi_asset_sp500_down_5pct/weekly_multi_asset_sp500_down_5pct_summary.json
            outputs/weekly_multi_asset_sp500_down_5pct/weekly_multi_asset_sp500_down_5pct_year_by_year.csv
            outputs/weekly_multi_asset_sp500_down_5pct/weekly_multi_asset_sp500_down_5pct_weekly_positions.csv
